<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium RP | Identidad Binacional</title>
    
    <link rel="icon" type="image/png" href="E.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card-bg: rgba(17, 17, 17, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
        }

        /* FONDO DE PARTÍCULAS */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at bottom, #0a1118 0%, #050505 100%);
        }

        /* NAVEGACIÓN */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid var(--primary); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); 
        }
        .nav-logo { height: 45px; }
        .nav-links a { 
            color: var(--primary); text-decoration: none; font-family: 'Orbitron'; 
            margin-left: 20px; font-size: 0.75rem; font-weight: bold; transition: 0.3s; 
        }
        .nav-links a:hover { text-shadow: 0 0 10px var(--primary); color: white; }

        /* HERO */
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .main-logo { width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); }
        h1 { font-family: 'Orbitron'; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 5px; }

        /* SECCIONES */
        .container { padding: 40px 8%; position: relative; z-index: 1; }
        .section-title { 
            text-align: center; font-family: 'Orbitron'; font-size: 2.2rem; 
            margin-bottom: 50px; text-transform: uppercase; letter-spacing: 3px;
        }

        /* DASHBOARD */
        .dashboard { 
            display: flex; background: rgba(10, 10, 10, 0.8); 
            border: 1px solid #222; border-radius: 20px; 
            height: 750px; overflow: hidden; backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .sidebar { 
            width: 300px; background: rgba(15, 15, 15, 0.7); 
            border-right: 1px solid #222; overflow-y: auto; 
        }

        .tab-btn { 
            width: 100%; padding: 18px 25px; border: none; background: none; 
            color: #666; text-align: left; cursor: pointer; 
            font-family: 'Orbitron'; font-size: 0.65rem; 
            border-left: 4px solid transparent; border-bottom: 1px solid #1a1a1a; 
            transition: 0.3s; 
        }
        .tab-btn:hover { color: var(--primary); background: rgba(0, 212, 255, 0.05); }
        .tab-btn.active { 
            color: var(--primary); background: rgba(30, 30, 30, 0.9); 
            border-left-color: var(--primary); 
        }

        .content-area { flex: 1; padding: 40px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--primary) #111; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }

        /* REGLAS (CARDS) */
        .rule-card { 
            background: rgba(25, 25, 25, 0.5); padding: 25px; 
            border-radius: 12px; margin-bottom: 20px; 
            border: 1px solid #333; transition: 0.3s; 
        }
        .rule-card:hover { 
            border-color: var(--primary); background: rgba(0, 212, 255, 0.03); 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1); transform: translateY(-3px);
        }
        .rule-card strong { 
            display: block; color: var(--primary); margin-bottom: 12px; 
            font-family: 'Orbitron'; font-size: 0.9rem; 
            border-bottom: 1px solid #222; padding-bottom: 8px; 
        }
        .rule-card p { color: #ddd; font-size: 0.95rem; line-height: 1.7; white-space: pre-line; text-align: justify; }
        .example { 
            display: block; margin-top: 10px; padding: 10px; 
            border-left: 2px solid var(--primary); background: rgba(0, 212, 255, 0.05);
            font-style: italic; color: #00d4ffaa; font-size: 0.85rem;
        }

        /* TABLA DE RESCATES */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        th { background: var(--primary); color: black; font-family: 'Orbitron'; font-size: 0.7rem; padding: 12px; text-align: left; }
        td { padding: 12px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #222; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .dashboard { flex-direction: column; height: auto; }
            .sidebar { width: 100%; display: flex; overflow-x: auto; border-right: none; }
            .tab-btn { white-space: nowrap; border-bottom: 2px solid #1a1a1a; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav>
        <img src="E.png" alt="Elysium Logo" class="nav-logo">
        <div class="nav-links">
            <a href="#inicio">INICIO</a>
            <a href="#quienes-somos">NOSOTROS</a>
