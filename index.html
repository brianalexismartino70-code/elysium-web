    <title>Elysium RP | Identidad Binacional</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* Fondo de Partículas */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at bottom, #0a1118 0%, #050505 100%);
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--primary); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); }
        .nav-logo { height: 40px; }
        .nav-links a { color: var(--primary); text-decoration: none; font-family: 'Orbitron'; margin-left: 20px; font-size: 0.8rem; font-weight: bold; }

        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .main-logo { width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); }
        h1 { font-family: 'Orbitron'; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 5px; }

        .container { padding: 60px 8%; position: relative; z-index: 1; }
        .section-title { text-align: center; font-family: 'Orbitron'; font-size: 2.2rem; margin-bottom: 50px; text-transform: uppercase; color: #fff; }

        /* Quiénes Somos */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: rgba(17, 17, 17, 0.8); padding: 35px; border-radius: 15px; border: 1px solid #222; backdrop-filter: blur(10px); }
        .card h3 { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 15px; }

        /* Dashboard de Normas */
        .dashboard { display: flex; background: rgba(10, 10, 10, 0.9); border: 1px solid #222; border-radius: 15px; min-height: 600px; overflow: hidden; backdrop-filter: blur(10px); }
        .sidebar { width: 300px; background: rgba(17, 17, 17, 0.5); border-right: 1px solid #222; overflow-y: auto; }
        .tab-btn { width: 100%; padding: 20px 25px; border: none; background: none; color: #555; text-align: left; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; border-left: 4px solid transparent; border-bottom: 1px solid #1a1a1a; }
        .tab-btn.active { color: var(--primary); background: rgba(24, 24, 24, 0.8); border-left-color: var(--primary); }
        
        .content-area { flex: 1; padding: 45px; overflow-y: auto; max-height: 750px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
