<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium RP | Sin Fronteras</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #05080c;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            text-align: center;
        }
        /* Fondo con ligero degradado radial para dar profundidad */
        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 85, 255, 0.1) 0%, rgba(5, 8, 12, 1) 70%);
            z-index: -1;
        }
        .maint-container {
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        p { font-size: 1.2rem; color: #a8b2d1; margin: 5px 0; }
        
        /* Estilos para el LOGO de Elysium */
        .elysium-logo {
            width: 150px; /* Ajusta el tamaño según tu logo */
            height: auto;
            margin-bottom: 20px;
            /* Brillo de neón azul alrededor del logo */
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.7));
            /* Mantenemos la animación de pulso */
            animation: pulseLogo 3s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.7)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.9)); }
        }

        /* Barra de carga */
        .loader {
            width: 150px; height: 3px;
            background: rgba(255,255,255,0.1);
            margin: 35px auto;
            position: relative; overflow: hidden;
            border-radius: 3px;
        }
        .loader::after {
            content: '';
            position: absolute; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            animation: loading 2s infinite linear;
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        /* Ajustes para celulares */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .maint-container { padding: 30px; }
            .elysium-logo { width: 100px; }
        }
    </style>
</head>
<body>
    <div class="maint-container">
        <img src="E.png" alt="Elysium RP Logo" class="elysium-logo">
        
        <h1>ELYSIUM RP</h1>
        <p>Estamos haciendo reformas en la página web.</p>
        <div class="loader"></div>
        <p style="font-size: 0.9rem; opacity: 0.7; font-family: 'Orbitron', sans-serif; color: #00d4ff;">
            ACTUALIZACIÓN EN PROCESO
        </p>
        <p style="font-size: 0.85rem; opacity: 0.5; margin-top: 15px;">
            Volvemos en unas horas. ¡Prepárate para lo que se viene!.
        </p>
    </div>
</body>
</html>
