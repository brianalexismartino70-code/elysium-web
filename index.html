<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium RP | Página en mantenimiento</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #05080c;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            text-align: center;
        }
        .maint-container {
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 10px;
        }
        p { font-size: 1.2rem; color: #a8b2d1; }
        .logo-e {
            font-size: 5rem;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to bottom, #00d4ff, #0055ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        .loader {
            width: 100px; height: 3px;
            background: rgba(255,255,255,0.1);
            margin: 30px auto;
            position: relative; overflow: hidden;
        }
        .loader::after {
            content: '';
            position: absolute; left: -100%;
            width: 100%; height: 100%;
            background: #00d4ff;
            animation: loading 2s infinite linear;
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="maint-container">
        <div class="logo-e">E</div>
        <h1>ELYSIUM RP</h1>
        <p>Estamos haciendo reformas en el sitio web.</p>
        <div class="loader"></div>
        <p style="font-size: 0.9rem; opacity: 0.6;">Volvemos en unas horas. Prepárate para lo que se viene.</p>
    </div>
</body>
</html>
