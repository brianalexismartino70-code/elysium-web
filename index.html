    <style>
        :root { --primary: #00d4ff; --secondary: #0055ff; --bg: #050505; --card-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Fondo Animado */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); z-index: -1; }
        
        /* Navegación */
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--primary); }
        .nav-logo { height: 45px; filter: drop-shadow(0 0 5px var(--primary)); }
        .nav-links a { color: var(--primary); text-decoration: none; font-weight: bold; font-family: 'Orbitron'; margin-left: 20px; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover { text-shadow: 0 0 10px var(--primary); color: white; }

        /* Hero Section */
        .hero { height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .main-logo { width: 190px; margin-bottom: 25px; animation: pulse 3s infinite ease-in-out; border-radius: 50%; }
        
        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 15px var(--primary)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 30px var(--secondary)); transform: scale(1.05); }
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 5px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Contenedores Generales */
        .section-title { text-align: center; font-family: 'Orbitron'; font-size: 2.2rem; margin-bottom: 40px; color: #fff; text-transform: uppercase; letter-spacing: 3px; }
        .container { padding: 80px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

        /* Tarjetas */
        .card { background: var(--card-bg); padding: 35px; border-radius: 15px; border: 1px solid #222; transition: 0.4s; }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.15); }
        .card h3 { font-family: 'Orbitron', sans-serif; color: var(--primary); margin-bottom: 15px; }
        .card p { color: #aaa; line-height: 1.6; }

        /* --- DASHBOARD DE NORMAS --- */
